# ──────────────────────────────────────────────────────────────
#  Telegraf — MQTT → InfluxDB bridge for ETS Slow Control
#
#  Subscribes to all ets/sensors/# topics and writes each JSON
#  message into the "slowcontrol" bucket.  Drop this file into
#  your IOTStack telegraf config directory.
# ──────────────────────────────────────────────────────────────

[agent]
  interval   = "10s"
  flush_interval = "10s"

# ── Input: MQTT topics ─────────────────────────────────────────

[[inputs.mqtt_consumer]]
  servers   = ["tcp://mosquitto:1883"]
  topics    = [
    "ets/sensors/#",
    "ets/status/#",
  ]
  qos       = 1
  data_format = "json"
  # Mosquitto credentials — substituted from container env (MQTT_USER /
  # MQTT_PASS).  Set those in /home/pi/IOTstack/.env and pass them through in
  # /home/pi/IOTstack/docker-compose.yml under the telegraf service.  Empty
  # values fall through and the broker rejects with allow_anonymous=false.
  username = "${MQTT_USER}"
  password = "${MQTT_PASS}"
  # Capture string-valued JSON keys we care about (relay state, autovalve mode/state, etc.)
  json_string_fields = ["state", "mode"]

  # ets/sensors/{driver}/{channel}      4 segments  (LabJack TCs, RES, FRG, DHT)
  [[inputs.mqtt_consumer.topic_parsing]]
    topic     = "ets/sensors/+/+"
    tags      = "_/_/driver/channel"
    measurement = "_/_/_/measurement"

  # ets/sensors/lakeshore/{category}/{ch}  5 segments  (rtd/A, heater/1, setpoint/1)
  [[inputs.mqtt_consumer.topic_parsing]]
    topic       = "ets/sensors/+/+/+"
    tags        = "_/_/driver/category/channel"
    measurement = "_/_/_/measurement/_"

  # ets/status/{controller}             3 segments  (autovalve, humidity_pid, interlocks)
  [[inputs.mqtt_consumer.topic_parsing]]
    topic     = "ets/status/+"
    tags      = "_/_/component"
    measurement = "_/_/status"

  # ets/status/relays/{name}            4 segments  — each relay = own measurement
  [[inputs.mqtt_consumer.topic_parsing]]
    topic       = "ets/status/relays/+"
    tags        = "_/_/_/relay"
    measurement = "_/_/_/measurement"

  # ets/status/service/heartbeat        4 segments  — service heartbeat
  [[inputs.mqtt_consumer.topic_parsing]]
    topic       = "ets/status/service/+"
    tags        = "_/_/_/event"
    measurement = "_/_/_/measurement"

# ── Output: InfluxDB 2.x ──────────────────────────────────────

[[outputs.influxdb_v2]]
  urls         = ["http://influxdb2:8086"]
  token        = "${INFLUX_TOKEN}"
  organization = "ets"
  bucket       = "slowcontrol"
